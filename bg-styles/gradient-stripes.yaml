name: gradient-stripes
display: Gradient Stripes
tags: [featured]
pattern: |
  the surface is divided into VERTICAL PARALLEL STRIPES of varying widths
  (some thicker, some thinner), each stripe carrying a smooth gradient
  flowing FROM TOP TO BOTTOM. The stripes overlap and blend at their
  edges with soft Gaussian falloff (no hard lines between stripes).
  Within each stripe the color transitions smoothly from one palette
  color at the top to another at the bottom — but adjacent stripes are
  slightly offset in phase, so when viewed together they create a
  shimmering pleated / blinds / curtain-like depth effect. Subtle
  vertical motion implied.
palette_hint: |
  colors are arranged so that warmer / brighter tones dominate the upper
  portion and cooler / deeper tones dominate the lower portion (or
  reverse based on palette order). Each palette color smoothly bleeds
  into the next without abrupt breaks.
texture: smooth premium digital gradient rendering, soft photographic falloff at stripe edges, no banding, no posterization, no visible pixel grain — looks like a high-quality mesh-gradient compositor output
negative: hard sharp stripe boundaries, posterized banding, choppy color steps, horizontal stripes, diagonal stripes, single solid color, geometric shapes, 3d objects
