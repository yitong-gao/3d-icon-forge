name: mesh-flow
display: Mesh Gradient Flow
tags: [featured]
pattern: |
  the surface is a SMOOTH FLOWING MESH GRADIENT — colors transition
  organically across the frame in soft curving flows, like a digital
  mesh-gradient with 5-7 control points placed around the image
  creating natural color blooms and bleeds. NO defined shapes, NO
  stripes, NO blobs with edges — just pure continuous color flow with
  large soft regions where one color dominates, gradually melting into
  the next. The composition has a sense of subtle directional drift
  (e.g. colors flowing from upper-left to lower-right, or radiating
  from a soft center point).
palette_hint: |
  each palette color claims a soft "zone" of the image, with smooth
  boundaries where zones meet. The composition reads as a unified
  atmospheric whole rather than discrete colored areas.
texture: silky smooth mesh gradient with photographic-quality color falloff, no banding, no posterization, premium SaaS / fintech atmospheric brand aesthetic (think Stripe / Linear / Vercel marketing site backgrounds)
negative: hard color boundaries, defined shapes, stripes, blobs with edges, geometric patterns, sharp lines, posterized banding, choppy color steps, foreground 3d objects
