name: neon-tube
display: Neon Tube Sign
tags: [neon, glow, retro]
material: |
  formed from a single continuous bent glass neon tube glowing hot pink and cyan
  plasma inside the tube, thin metal end-caps and wires visible at the endpoints,
  soft bloom and glow halo around the tube, the form follows the shape of the
  subject in one elegant unbroken stroke
lighting: dark scene where the neon tube itself is the primary light source, subtle ambient fill to barely read the wall behind
background: deep matte charcoal-black wall with a very faint smooth gradient, no texture detail, no contact shadow (the subject glows above the wall)
negative: daylight, white background, multiple broken tubes, dim no-glow
