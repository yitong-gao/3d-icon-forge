name: chrome-led-screws
display: Chrome LED Screws & Status
tags: [metal, tech, glow, featured]
material: |
  presented as a thick satin brushed chrome metallic coin disc with the
  subject EMBOSSED in raised relief on the top face. The disc has SMALL
  DECORATIVE MICRO-DETAILS that signal "real device": (a) four tiny
  recessed phillips-head SCREWS at the four cardinal compass points
  (12, 3, 6, 9 o'clock) just inside the outer rim, (b) a SINGLE TINY
  GREEN STATUS LED DOT glowing softly near the 12 o'clock position, and
  (c) a subtle small etched mark / serial number text on the rim. Chrome
  is satin brushed matte silver (NOT mirror-polished), fine brushing
  texture, muted neutral highlights. Around the outer edge / seam between
  upper and lower chrome plates runs a thin saturated VIVID ELECTRIC-BLUE
  / CYAN LED light strip — blue color clearly readable, NOT over-exposed,
  only subtle halo. Disc oriented slightly tilted so you can see the
  top face with the screws and green LED dot AND the side profile with
  the blue LED rim. Industrial-design / vintage-tech-product aesthetic.
negative: featureless disc, no screws, no details, hyper-glossy mirror, washed-out white glow, polished chrome, decorative excess
