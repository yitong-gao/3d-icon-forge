name: pearl-charcoal
display: Pearl Marble with Charcoal Flecks
tags: [stone, marble, pearlescent, featured]
material: |
  sculpted from polished pearl-white marble stone — a SOLID stone form with
  clean smooth sculpted edges and crisp planar surfaces (definitely NOT
  balloon-puffy, NOT pinched at seams, NOT inflated, NO foil wrinkles). The
  marble has a soft pearlescent satin sheen with subtle mother-of-pearl
  iridescent shimmer that shifts between pale pink, cream, gold and faint
  mint as the light grazes the surface. Scattered ASYMMETRICALLY across
  the surface are charcoal-black ink flecks, irregular dark smudges, and
  tiny scratchy debris marks (varying from pinpoint specks to small organic
  ink-drop shapes), as if a brush flicked ink drops onto polished pearl
  marble. Premium gallery-sculpture feel — clean cut stone with artistic
  ink-fleck patina, no industrial perfection.
negative: balloon, pinched seams, foil wrinkles, puffy inflated form, soft pillowy edges, evenly distributed polka dots, regular pattern, mirror chrome, harsh black-on-white contrast
