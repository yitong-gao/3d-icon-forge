name: chrome-led-knurled
display: Chrome LED Knurled Disc
tags: [metal, tech, glow, featured]
material: |
  presented as a thick satin brushed chrome metallic coin disc with the
  subject EMBOSSED in raised relief on the top face. The SIDE PROFILE of
  the disc (the vertical rim between the top and bottom faces) features
  FINE VERTICAL KNURLED GROOVES — closely-spaced parallel vertical ridges
  running around the entire circumference (like a watch crown texture, a
  camera lens focus ring, or a Nikon lens knurled grip). These knurled
  grooves give the side a tactile fluted texture catching the light. The
  chrome is satin brushed matte silver (NOT mirror-polished), fine
  brushing on the top face, muted highlights. Around the outer edge / seam
  between upper and lower chrome plates runs a thin saturated VIVID
  ELECTRIC-BLUE / CYAN LED light strip — blue color clearly readable, NOT
  over-exposed, only subtle halo. Disc oriented slightly tilted so you can
  see the top face AND the knurled side profile AND the blue LED rim.
negative: smooth side, hyper-glossy mirror, washed-out white glow, no side texture, polished chrome
