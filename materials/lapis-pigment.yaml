name: lapis-pigment
display: Lapis Lazuli Pigment
tags: [pigment, mineral, pattern, featured]
material: |
  the form is shaped as a COMPRESSED BLOCK OF LAPIS LAZULI PIGMENT —
  the legendary ultramarine blue pigment historically used in Persian
  miniature paintings and illuminated Quran manuscripts. The body is a
  deep cobalt royal blue (#011FE5 territory), the impossibly saturated
  mineral blue lapis is famous for, with subtle natural tonal variation.
  Scattered THROUGHOUT the form are TINY GOLD PYRITE FLECKS — small
  golden specks naturally embedded in real lapis lazuli, catching the
  light like stars. The EDGES of the form have crumbled pigment powder
  bits and fine blue dust falling off, as if recently carved from a
  larger mineral chunk. Matte natural mineral surface, NOT glossy.
  Premium illuminated-manuscript aesthetic.
negative: glossy, polished, no gold flecks, single uniform blue, painted, plastic, no crumble edges, hyper-saturated cartoon blue, smooth surface, multiple bright colors
