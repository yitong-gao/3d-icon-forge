name: chrome-led-glow
display: Chrome Disc with LED Glow
tags: [metal, tech, glow, featured]
material: |
  presented as a thick SATIN BRUSHED CHROME metallic coin disc with the
  subject EMBOSSED in raised relief on the top face of the disc — the
  chrome body is a SOFT BRUSHED MATTE silver finish (NOT mirror-polished,
  NOT hyper-glossy) with visible fine directional brushing texture catching
  the light gently, muted neutral specular highlights, museum-grade
  precision-machined feel like brushed aluminum or matte stainless steel.
  Around the outer edge / the seam between the upper and lower chrome
  plates runs a thin glowing LED LIGHT STRIP emitting a SATURATED VIVID
  ELECTRIC-BLUE / CYAN color (the blue COLOR is clearly visible and
  readable, NOT over-exposed to white, NOT washed out, NOT pure bloom) —
  the LED has only a SUBTLE soft halo, the blue light itself stays
  controlled and color-saturated. The embossed subject sits raised on the
  top face with subtle self-shadow from its own relief. The disc is
  oriented slightly tilted so you can see both the embossed top face AND
  the side profile (where the blue LED rim is visible as a saturated blue
  band sandwiched between the brushed chrome plates). High-end smart-
  device aesthetic — Apple Vision Pro / Nothing / Teenage Engineering vibe,
  but with a matte non-mirror chrome.
negative: hyper-glossy mirror chrome, polished mirror, over-exposed LED, washed-out white glow, pure bloom, missing blue color, no brushing texture, smooth shiny plastic, warm gold, flat coin, no LED, single-piece disc
