name: iznik-glass
display: Iznik Stained Glass
tags: [glass, pattern, featured]
material: |
  the form is a PREMIUM IZNIK-INSPIRED STAINED GLASS PANEL — surface
  divided into 5-8 LARGER geometric panes (NOT dense mosaic). Palette:
  ~70% deep cobalt blue (#011FE5 royal blue), ~20% warm burnished
  gold/amber, ~10% minimal Iznik-turquoise accent — NO red, NO green,
  NO kindergarten colors. Between the panes runs HAND-FORGED AGED BRASS
  CAMES with VISIBLE HAMMER MARKS, OXIDATION PATINA (greenish-blue
  verdigris in crevices), TARNISHED EDGES, tactile worked-metal texture
  — centuries-old mosque hardware. The glass panes themselves have
  HAND-BLOWN imperfections — slight thickness variation, tiny air
  bubbles trapped inside, gentle waviness, organic edges. Light glows
  softly through the cobalt panes. Ottoman heritage craftsmanship,
  weathered and authentic.
negative: clean modern brass, smooth plastic metal, perfect machined edges, flat painted decal, dense small mosaic, dark lead cames, cheap children's craft, red, green, vivid rainbow, no patina, no hammer marks
