name: spice-pigment
display: Spice Market Pigment
tags: [pigment, organic, pattern, featured]
material: |
  the form is shaped as a COMPRESSED SPICE PIGMENT POWDER BLOCK — like
  the brick of pure pressed pigment piled in a Middle Eastern spice
  market. The body is divided into VIVID SATURATED COLOR ZONES of pure
  powdered spice: deep saffron-yellow, brick-red sumac, paprika orange,
  turmeric gold, and cardamom green — each zone has a clean boundary
  but soft natural transition. Matte natural powder surface with visible
  fine grain. The EDGES of the form have small crumbled powder bits and
  dust falling off, as if the brick has been recently broken from a
  larger mound. Slight tonal variation within each zone gives organic
  depth.
negative: glossy, polished, single uniform color, painted pattern, plastic, smooth surface, no crumble, no edge debris, machine-clean edges
