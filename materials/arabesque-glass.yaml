name: arabesque-glass
display: Arabesque Stained Glass
tags: [glass, pattern, heritage, featured]
material: |
  the surface is decorated as a SIMPLIFIED ROSE-WINDOW COMPOSITION
  inspired by Islamic mosque windows — organized as THREE concentric
  bands (NOT 4+ layers, NO calligraphy band, NO dense mosaic):
  (1) outer: a thin BURNISHED GOLD/BRASS BORDER FRAME punctuated by
  small WARM BRICK-RED TRIANGLE ACCENT DOTS spaced evenly around the
  frame,
  (2) middle: a band of LARGER geometric tiles — 4 colors (deep cobalt
  blue (#011FE5), amber-gold, white, plus warm brick-red as small
  accent pieces — about 10% red content for vibrant pop) arranged as
  repeating 8-point stars with generous spacing between motifs (NOT
  dense tessellation),
  (3) center: a small GOLD ROSETTE MEDALLION with a WARM BRICK-RED
  CIRCULAR CORE at its heart — abstract geometric, no Arabic calligraphy.
  Generous breathing room between the three bands. Aged brass cames
  between glass pieces with subtle hammer marks. Premium modern
  abstraction of mosque rose window — restrained, not literal-tourist-
  replica.
negative: more than 3 layers, calligraphy, Arabic script, dense small tessellation, many small mosaic pieces, busy ornament, chaotic detail, more than 4 colors, green, turquoise, dominant red, no breathing space, no red accent
