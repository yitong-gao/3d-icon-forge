name: mashrabiya
display: Mashrabiya Wood Lattice
tags: [wood, pattern, architectural, featured]
material: |
  the form is carved as a 3D MASHRABIYA WOODEN LATTICE — warm walnut /
  teak hardwood with deeply CARVED CUT-OUT GEOMETRIC PATTERNS (8-point
  Islamic stars, hexagons, and rotating geometric mesh) penetrating
  THROUGH the form so you can see the lattice negative-space holes.
  Natural wood grain visible, warm reddish-brown tone with subtle
  variation. Slight wear at the edges showing the wood's hand-carved
  craft. Soft warm sunlight casts geometric SHADOW PATTERNS through the
  cutouts onto the cream backdrop behind, creating spotted/striped
  light play. The mashrabiya pattern density is high enough to read
  clearly but open enough that the form has airy depth (you see THROUGH
  it).
negative: solid opaque wood, painted pattern, no cutouts, no lattice, plastic, smooth flat surface, dark plastic black
