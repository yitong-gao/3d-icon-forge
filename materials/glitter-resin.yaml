name: glitter-resin
display: Coral Glitter Resin
tags: [translucent, sparkle, candy, featured]
material: |
  cast from warm translucent coral-peach resin (rose-amber tinted, semi-
  transparent) with HUNDREDS of tiny suspended glitter flakes throughout the
  interior — the flakes catch the light in sparkly pinpricks scattered across
  the whole volume, both on the surface and embedded deep inside. Soft rounded
  blob-like form with smooth glassy outer surface and slight wet glossy
  highlights. Strong subsurface scattering: light passes through the resin
  and emerges with a warm amber-coral glow, the suspended glitter twinkling
  inside. Candy-resin / amber-with-confetti aesthetic.
negative: opaque, flat color, no glitter, dull, hard plastic, matte
