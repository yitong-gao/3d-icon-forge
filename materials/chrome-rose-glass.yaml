name: chrome-rose-glass
display: Chrome-Rose Glass Fusion
tags: [glass, metal, hybrid, featured]
material: |
  a hybrid material that fuses polished liquid chrome with translucent rose-
  pink glass — the upper portions of the form read as hyper-reflective mirror
  chrome (cool silver with sharp environmental specular highlights), gradually
  TRANSITIONING DOWNWARD into translucent rose-pink crystal glass at the
  bottom and edges (you can see soft light passing through the pink glass
  portions). The boundary between chrome and rose glass is smooth and fluid,
  as if liquid mercury is dissolving into pink glass. Hyper-glossy lacquer
  surface throughout, mirror reflections on the chrome zones, refraction
  caustics on the rose glass zones.
negative: solid opaque pink, uniform chrome only, plastic, harsh boundary, matte
