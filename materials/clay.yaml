material: |
  hand-sculpted from raw unfired earthy terracotta clay — distinctly imperfect
  hand-pressed surface with VISIBLE THUMBPRINTS and fingerprint impressions all
  over the form, irregular bumpy grain texture, tiny natural mineral specks
  embedded throughout, soft uneven chamfered edges where fingers pressed and
  smoothed, warm brown-orange earthy tone, completely matte (no glaze, no
  sheen), the rough hand-crafted feel of clay before firing — every plane
  shows tiny tool marks and gentle deformations from being shaped by hand.
negative: smooth surface, polished, glossy, sheen, glazed, metallic, plastic, machine-perfect, uniform texture
