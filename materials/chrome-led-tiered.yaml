name: chrome-led-tiered
display: Chrome LED Tiered Disc
tags: [metal, tech, glow, featured]
material: |
  presented as a thick satin brushed chrome metallic coin disc with a SUBTLE
  multi-tier sculpted top face — the construction goes from outside to
  inside as: (1) an outer raised chrome RIM with a soft beveled edge, (2)
  a THIN DECORATIVE ETCHED RING LINE (just a hairline indent, a fine
  shallow circular groove acting as a decorative accent line — NOT a wide
  moat, NOT a deep step), and (3) the slightly raised central area where
  the subject is EMBOSSED in raised relief. The etched ring should be
  delicate, just a few pixels wide, purely ornamental like a watch dial's
  index ring. The chrome is satin brushed matte silver (NOT mirror-
  polished), fine directional brushing texture, muted neutral specular
  highlights. Around the outer edge / seam between upper and lower chrome
  plates runs a thin saturated VIVID ELECTRIC-BLUE / CYAN LED light strip
  — blue color clearly readable, NOT over-exposed, only subtle halo.
  Disc oriented slightly tilted so you can see the multi-tier top face
  AND the side profile with the blue LED rim. Premium smart-device feel.
negative: wide moat groove, deep recessed step, large concentric inset, hyper-glossy mirror, washed-out white glow, flat featureless disc, polished chrome, no decorative line at all
