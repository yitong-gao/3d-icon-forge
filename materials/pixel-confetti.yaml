name: pixel-confetti
display: Pixel Confetti Resin
tags: [translucent, sparkle, digital, featured]
material: |
  sculpted from translucent frosted white-silver resin (semi-transparent with
  a gentle pearlescent iridescent shimmer on the surface), with HUNDREDS of
  suspended FLAT 2D COLORED PIXEL SQUARES embedded throughout the interior
  volume — bright lemon-yellow and lime-green pixel squares are the dominant
  accent color, mixed with smaller white and pale silver pixel squares as
  filler. The pixels are PERFECTLY FLAT 2D squares (NOT 3D cubes, NOT round
  glitter flakes), varying in size from tiny pinpoints to medium chunks,
  scattered in random clusters of varying density throughout the entire form.
  Minecraft-meets-resin aesthetic — like flat digital confetti suspended
  inside a frosted ice block. Glossy lacquer outer surface, soft ambient
  interior glow from the trapped light.
negative: 3d cubes, round glitter flakes, single color, opaque body, dull, hard plastic, evenly spaced grid pattern, sparse few pixels
