name: pixel-confetti
display: Pixel Confetti Resin
tags: [translucent, digital, featured]
material: |
  a translucent semi-transparent frosted glass-resin form — the body is
  MOSTLY EMPTY CLEAR TRANSLUCENT GLASS, with only a SPARSE SCATTERING of
  flat colored pixel squares as accents. The CLEAR TRANSLUCENT BODY is
  the dominant visual (~65% of the surface should read as bare empty
  translucent material, no pixels), pixels are airy accents
  (~35% surface coverage TOTAL). Imagine a clear glass form where someone
  has placed maybe 25-35 small/medium yellow pixel squares scattered
  evenly across the visible surface, plus maybe 70-100 tiny white/silver
  pixel pinpoints filling between them — each pixel surrounded by
  generous empty translucent space, NEVER touching adjacent pixels. The
  yellow pixels are MEDIUM-SIZED accent squares (each yellow square is a
  small standout shape, not tiny), the white pixels are TINY pinpoints
  (much smaller than the yellows). Distribution is uniform across the
  whole form (no clustering, no empty zones, just airy even scatter).
  Each pixel is a perfectly FLAT 2D square (NOT a 3D cube, NOT a glitter
  flake), NOT arranged in a grid, NOT a checkerboard. Color: ONLY white,
  pale silver, and bright lemon-yellow — no other colors.
negative: dense packed pixels, pixels touching each other, more than 50% coverage, busy texture, full surface coverage, tiled pattern, checkerboard, equal-sized pixels everywhere, opaque body, lime-green, blue, multi-colored, clustered, overwhelming busy pattern, no empty space
