name: pearl-mother
display: Mother-of-Pearl (Opal Fire)
tags: [pearl, iridescent, featured]
material: |
  the form is sculpted from a hybrid of MOTHER-OF-PEARL and PRECIOUS OPAL
  — the body has the layered natural striations of real nacre BUT with
  DRAMATIC OPAL-GRADE COLOR PLAY flowing across the surface: vivid
  flashes of saturated blue, magenta-pink, emerald-green, and warm gold
  shimmer dancing through the form (like Australian black opal "fire"),
  with the colors organically flowing as if painted by light. The base
  is still a luminous pearly white but the iridescence is FAR more
  intense than ordinary mother-of-pearl, comparable to a watercolor-
  ribbon aesthetic but rendered as a 3D opal-pearl form with internal
  color shifting (NOT painted strokes). Smooth glossy surface with soft
  specular highlights, organic flowing color, no decoration overlay —
  the color play IS the decoration.
negative: subtle subtle shimmer, plain milky white, monotone pearl, gold filigree, embroidered overlay, decoration on top, plastic, hyper-glossy mirror, single color
