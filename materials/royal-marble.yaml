name: royal-marble
display: Royal Blue + Marble + Gold
tags: [stone, pattern, heritage, featured]
material: |
  the surface is a refined palace-decoration composition built from
  THREE clearly-visible materials: (1) deep royal cobalt blue ceramic
  glaze (#011FE5 deep ultramarine) as the dominant ~55% base,
  (2) PROMINENT WHITE MARBLE PANELS — recognizable polished marble
  inlay zones at ~25% with visible SUBTLE GREY VEINING (real Carrara-
  style marble texture, NOT just white paint), positioned as
  architectural inlay strips (e.g. a vertical/horizontal marble band)
  or corner panels framing the blue zones, (3) ELEGANT GOLD ARABESQUE
  TRACERY at ~20% (concentrated along edges + one central medallion —
  fine floral arabesque vines and ONE central geometric rosette,
  Ottoman manuscript illumination precision, NOT covering the entire
  surface). The blue / marble / gold are visually balanced — you can
  clearly see each material as a distinct architectural element, not
  blended. Modern luxury-hotel-brand aesthetic (Aman, Bvlgari, Park
  Hyatt mosque-inspired interior).
negative: gold coverage exceeding 30%, gold filling the entire surface, busy wallpaper pattern, more than 3 materials, dense ornament everywhere, red, green, orange, calligraphic text, chaotic detail, missing marble, marble invisible, marble as pure white without veining, marble less than 15% visible
