name: liquid-gold
display: Liquid Gold
tags: [metal, reflective, luxury]
material: |
  molten LIQUID 18-karat warm yellow gold caught mid-flow — the form is
  clearly VISCOUS and FLUID, with elegant POOLED DRIPS at the bottom
  edges, gentle BULBOUS SWELLS where the gold has gathered, and a
  thicker MOLTEN BEAD or two hanging off as if about to drip. The
  surface has HAND-WORKED ARTISAN TEXTURE — visible HAMMER MARKS, soft
  FORGE PEEN dimples, and organic irregularities that catch light in
  warm broken highlights (NOT a smooth machine-polished mirror). Rich
  amber and honey gold tones with tonal variation between bright peaks
  and softer recesses. The combination is "freshly poured artisan gold"
  — molten enough to feel ALIVE and FLOWING, but textured enough to feel
  HAND-MADE not factory-shiny. Warm specular highlights on the
  high points, subtle matte zones in the recesses.
negative: hyper-glossy mirror, smooth machine-polished surface, plastic, dull matte, painted gold, completely solid rigid form, no drips, no molten flow, flat featureless gold
