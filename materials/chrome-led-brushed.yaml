name: chrome-led-brushed
display: Chrome LED Brushed Disc
tags: [metal, tech, glow, featured]
material: |
  presented as a thick satin brushed chrome metallic coin disc with the
  subject EMBOSSED in raised relief on the top face. The chrome top face
  features CLEARLY VISIBLE CONCENTRIC HAIRLINE BRUSHING PATTERNS —
  directional circular brush marks radiating outward from the center
  forming visible concentric rings of fine hairline texture (like the
  brushed-aluminum face of a high-end audio device or watch dial). The
  rim has radial brushing (lines pointing outward). These hairline patterns
  are subtle but distinctly visible when light catches them. Chrome is
  satin matte silver (NOT mirror-polished), muted highlights. Around the
  outer edge / seam between upper and lower chrome plates runs a thin
  saturated VIVID ELECTRIC-BLUE / CYAN LED light strip — blue color clearly
  readable, NOT over-exposed, only subtle halo. Disc oriented slightly
  tilted so you can see the brushed top face AND the side profile with the
  blue LED rim.
negative: smooth featureless surface, no brushing texture, hyper-glossy mirror, washed-out white glow, polished chrome, plain matte
